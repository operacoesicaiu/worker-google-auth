name: Teste Relatorio 2 Meses (Manual)

on:
  workflow_dispatch: 

jobs:
  test-dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    
    steps:
      - uses: actions/checkout@v4
      - name: Explicit Secret Masking
        run: |
          echo "::add-mask::${{ secrets.GOOGLE_CLIENT_EMAIL }}"
          echo "::add-mask::${{ secrets.GH_PAT }}"
          
          echo "${{ secrets.GOOGLE_PRIVATE_KEY }}" | while read -r line; do
            if [ -n "$line" ]; then
              echo "::add-mask::$line"
            fi
          done
      - name: Disparar Token de Relatorio
        env:
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_DESTINO: "operacoesicaiu/worker-zoho-integration" 
        run: |
          sed -i 's/google_token_ready/report_token_ready/g' index.js
          node index.js
