name: Teste Relatorio 2 Meses (Manual)

on:
  workflow_dispatch: 

jobs:
  test-dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write  # Essencial para gravar o Secret no destino
      id-token: write
    
    steps:
      - uses: actions/checkout@v4

      # --- NOVO: Configura o Node ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- NOVO: Instala a biblioteca libsodium ---
      - name: Instalar dependências
        run: npm install

      - name: Disparar Token de Relatorio
        env:
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_DESTINO: "operacoesicaiu/worker-zoho-integration" 
        run: |
          # Alteração dinâmica do tipo de evento antes da execução
          sed -i 's/google_token_ready/report_token_ready/g' index.js
          node index.js
