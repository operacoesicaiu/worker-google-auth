name: Run Google Auth Worker

on:
  schedule:
    - cron: '0 9 * * *' # 06:00 AM Brasília
  workflow_dispatch:

jobs:
  generate-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Token para Hablla
        env:
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          # Repositório do Hablla
          REPO_DESTINO: 'operacoesicaiu/worker-hablla-integration'
        run: node index.js

      - name: Token para Zoho
        env:
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          # Repositório do Zoho (Ajuste o nome se for diferente)
          REPO_DESTINO: 'operacoesicaiu/worker-zoho-sync' 
        run: node index.js
