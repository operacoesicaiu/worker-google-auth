name: Run Google Auth Worker

on:
  schedule:
    - cron: '0 14 * * *' # 06:00 AM Brasília
  #workflow_dispatch:
  #  inputs:
  #    repo_especifico:
  #      description: 'Repositório específico (Ex: operacoesicaiu/worker-zoho-sync). Deixe VAZIO para rodar TODOS.'
  #      required: false
  #      default: ''

jobs:
  generate-and-dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      id-token: write
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # --- Configurar a versão do Node ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- Baixar a libsodium e outras libs ---
      - name: Instalar dependências
        run: npm install

      - name: Executar Disparos
        env:
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_MANUAL: ${{ github.event.inputs.repo_especifico }}
        run: |
          if [ "$REPO_MANUAL" != "" ]; then
            echo "Rodando apenas para repositório manual: $REPO_MANUAL"
            REPO_DESTINO="$REPO_MANUAL" node index.js
          else
            echo "Iniciando disparos padrão com intervalos de 5 minutos..."

            echo "Disparando Zoho..."
            REPO_DESTINO="operacoesicaiu/worker-zoho-integration" node index.js
            sleep 300

            echo "Disparando Zenvia..."
            REPO_DESTINO="operacoesicaiu/worker-zenvia-integration" node index.js
            sleep 300
            
            echo "Disparando Hablla..."
            REPO_DESTINO="operacoesicaiu/worker-hablla-integration" node index.js
            sleep 300
            
            echo "Disparando SIGE Auth..."
            REPO_DESTINO="operacoesicaiu/worker-sige-auth" node index.js
          fi
