name: Run Google Auth Worker

on:
  schedule:
    - cron: '0 9 * * *' # 06:00 AM Brasília
  workflow_dispatch:
    inputs:
      repo_especifico:
        description: 'Repositório específico (Ex: operacoesicaiu/worker-zoho-sync). Deixe VAZIO para rodar TODOS.'
        required: false
        default: ''

jobs:
  generate-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Executar Disparos
        env:
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # 1. Se o usuário digitou um repositório manual no input
          if [ "${{ github.event.inputs.repo_especifico }}" != "" ]; then
            echo "Rodando apenas para repositório manual: ${{ github.event.inputs.repo_especifico }}"
            REPO_DESTINO="${{ github.event.inputs.repo_especifico }}" node index.js
          
          # 2. Se for agendamento (cron) ou input vazio, roda a lista padrão
          else
            echo "Iniciando disparos padrão (Hablla, Zoho e Zenvia)..."
            
            echo "Enviando para Hablla..."
            REPO_DESTINO="operacoesicaiu/worker-hablla-integration" node index.js
            
            echo "Enviando para Zoho..."
            REPO_DESTINO="operacoesicaiu/worker-zoho-integration" node index.js

            echo "Enviando para Zenvia..."
            REPO_DESTINO="operacoesicaiu/worker-zenvia-integration" node index.js
          fi
