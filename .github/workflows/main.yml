name: Run Google Auth Worker

on:
  schedule:
    - cron: '0 9 * * *' # 06:00 AM Brasília
  workflow_dispatch:
    inputs:
      repo_especifico:
        description: 'Repositório específico (Ex: operacoesicaiu/worker-zoho-sync). Deixe VAZIO para rodar TODOS.'
        required: false
        default: ''

jobs:
  generate-and-dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Executar Disparos
        env:
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_MANUAL: ${{ github.event.inputs.repo_especifico }}
        run: |
          if [ "$REPO_MANUAL" != "" ]; then
            echo "Rodando apenas para repositório manual: $REPO_MANUAL"
            REPO_DESTINO="$REPO_MANUAL" node index.js
          else
            echo "Iniciando disparos padrão..."
            
            REPO_DESTINO="operacoesicaiu/worker-hablla-integration" node index.js
            REPO_DESTINO="operacoesicaiu/worker-zoho-integration" node index.js
            REPO_DESTINO="operacoesicaiu/worker-zenvia-integration" node index.js
          fi
