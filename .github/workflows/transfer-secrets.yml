name: Transfer Secrets
on: workflow_dispatch # Permite rodar manualmente pelo botão "Run workflow"

jobs:
  copy-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Transferir Secrets via API
        env:
          GH_TOKEN: ${{ secrets.TRANSFER_TOKEN }}
          DEST_REPO: "operacoesicaiu/icaiu-data"
        run: |
          # Lista de secrets para copiar (Nome de Origem:Nome de Destino)
          declare -A SECRETS_MAP=(
            ["ZOHO_CLIENT_ID"]="ZOHO_CLIENT_ID"
            ["COLUMN_MAPPING"]="ZOHO_SCHEDULING_COLUMN_MAPPING"
            ["ZOHO_REFRESH_TOKEN"]="ZOHO_REFRESH_TOKEN"
          )

          for SRC in "${!SECRETS_MAP[@]}"; do
            DEST=${SECRETS_MAP[$SRC]}
            # Pega o valor do secret atual (disponível no contexto de secrets)
            # Nota: Você precisa mapear cada secret individualmente no 'env' abaixo
            VALUE="${!SRC}"
            
            echo "Transferindo $SRC para $DEST..."
            gh secret set "$DEST" --repo "$DEST_REPO" --body "$VALUE"
          done
      # Importante: Para o script acima funcionar, você precisa declarar os secrets de origem no env:
      env:
        GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
        GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
